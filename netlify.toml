[build]
  publish = "public"
  functions = "netlify/functions"

[[redirects]]
  from = "/api/ai"
  to = "/.netlify/functions/ai"
  status = 200

[[redirects]]
  from = "/api/models"
  to = "/.netlify/functions/models"
  status = 200

[[redirects]]
  from = "/api/test-ai"
  to = "/.netlify/functions/test-ai"
  status = 200

[[redirects]]
  from = "/api/test-groq"
  to = "/.netlify/functions/test-ai"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "no-cache"
